<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dungeon Spark</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #222;
      color: #fff;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 12px;
    }
    canvas {
      display: block;
      background: #000;
      image-rendering: pixelated;
    }
    .caption {
      font-size: 12px;
      color: #888;
      margin: 0;
    }
  </style>
</head>
<body>
  <canvas id="game" width="640" height="480"></canvas>
  <p class="caption">Dungeon Spark — Stage 4: slime AI. WASD/Arrows to move. Slime chases every 500ms. No attack yet.</p>
  <script>
    // Dungeon Spark — Stage 3: player movement.
    // Adds a keydown listener (WASD/Arrows) that calls movePlayer(dx, dy).
    // movePlayer bounds-checks against the 4 wall edges and redraws.
    // NO attack, NO AI, NO win/lose, NO restart, NO animation loop.
    (function init() {
      var canvas = document.getElementById('game');
      if (!canvas || !canvas.getContext) return;
      var ctx = canvas.getContext('2d');
      if (!ctx) return;

      // Game state (Stage 3): just positions + facing. No state machine yet.
      var player = { col: 2, row: 2, facing: 'right', hp: 5 };
      var slime  = { col: 17, row: 12, hp: 3 }; // mutable in Stage 4: slime AI moves it

      // Stage 5: attack cooldown guard (initialized to 0 so first attack is ready)
      var lastAttackTime = 0;
      // Stage 5: yellow swing-flash visual on the target tile
      var attackFlash = { col: -1, row: -1, until: 0 };
      // Stage 6: red hit-flash on the player tile when slime deals contact damage
      var playerFlash = { col: -1, row: -1, until: 0 };
      // Stage 7: game state machine. Allowed values: 'playing' | 'win' | 'lose'.
      // 'win'  = slime.hp reached 0 (player won)
      // 'lose' = player.hp reached 0 (player died)
      // All four gameplay functions (movePlayer, playerAttack, slimeTick,
      // applyContactDamage) early-return when state !== 'playing', so a
      // 'win' or 'lose' state freezes the scene and the final overlay is
      // the last thing the player sees. No restart yet — that's Stage 8.
      var state = 'playing';

      // Tile constants from design/technical-values.md
      var TILE   = 32;
      var COLS   = 20; // 0..19
      var ROWS   = 15; // 0..14
      var W      = COLS * TILE; // 640
      var H      = ROWS * TILE; // 480
      var COL_MIN = 1, COL_MAX = 18; // floor cols
      var ROW_MIN = 1, ROW_MAX = 13; // floor rows

      function render() {
        // 1. Clear (background = walls, the black ring)
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);

        // 2. Floor: cols 1..18, rows 1..13
        ctx.fillStyle = '#333';
        for (var row = ROW_MIN; row <= ROW_MAX; row++) {
          for (var col = COL_MIN; col <= COL_MAX; col++) {
            ctx.fillRect(col * TILE, row * TILE, TILE, TILE);
          }
        }

        // 3. Walls (col 0, col 19, row 0, row 14) — same color as bg, drawn
        //    explicitly so the wall ring is owned by the same renderer.
        ctx.fillStyle = '#000';
        for (var c = 0; c < COLS; c++) {
          ctx.fillRect(c * TILE, 0 * TILE, TILE, TILE);          // row 0
          ctx.fillRect(c * TILE, (ROWS - 1) * TILE, TILE, TILE); // row 14
        }
        for (var r = 1; r <= ROWS - 2; r++) {
          ctx.fillRect(0 * TILE, r * TILE, TILE, TILE);           // col 0
          ctx.fillRect((COLS - 1) * TILE, r * TILE, TILE, TILE);  // col 19
        }

        // 4. Slime at (slime.col, slime.row) — moved by slimeTick() every 500ms
        ctx.fillStyle = 'rgb(180, 40, 180)';
        ctx.fillRect(slime.col * TILE, slime.row * TILE, TILE, TILE);

        // 4b. Stage 5: yellow attack-flash on the swing's target tile.
        //     Drawn after the slime so a successful hit overlays the slime
        //     for the cooldown duration, but before the player so the player
        //     sprite always remains visible on their own tile.
        if (Date.now() < attackFlash.until) {
          ctx.fillStyle = 'yellow';
          ctx.fillRect(attackFlash.col * TILE, attackFlash.row * TILE, TILE, TILE);
        }

        // 5. Player at (player.col, player.row)
        ctx.fillStyle = 'blue';
        ctx.fillRect(player.col * TILE, player.row * TILE, TILE, TILE);

        // 5b. Stage 6: red hit-flash on the player's tile after contact
        //     damage. Drawn AFTER the player so the flash overlays the
        //     player tile for the 200ms flash duration. A dead slime
        //     never sets this; player.hp may go negative (no death state).
        if (Date.now() < playerFlash.until) {
          ctx.fillStyle = 'red';
          ctx.fillRect(playerFlash.col * TILE, playerFlash.row * TILE, TILE, TILE);
        }

        // 6. HUD — text setup
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px monospace';
        ctx.textBaseline = 'top';

        // 7. HUD — Player HP (top-left)
        ctx.fillText('Player HP: ' + player.hp, 8, 8);

        // 8. HUD — Slime HP (top-right)
        ctx.fillText('Slime HP: ' + slime.hp, W - 130, 8);

        // 8b. Stage 7: state indicator (top-center). Color-coded:
        //      white = playing, lime = win, red = lose. Tiny but visible.
        ctx.fillStyle = state === 'win' ? 'lime' : (state === 'lose' ? 'red' : 'white');
        ctx.fillText('State: ' + state, 280, 8);
        // restore default fillStyle for the rest of the HUD
        ctx.fillStyle = '#fff';

        // 9. State text (center) — title in Stage 3
        ctx.fillText('DUNGEON SPARK', (W / 2) - 60, (H / 2) - 8);

        // 10. Controls placeholder (bottom)
        ctx.fillText('WASD/Arrows: move | Space: attack | R: restart', 80, H - 24);

        // 11. Stage 7: end-game overlay. Drawn LAST so it sits on top of
        //     the scene. A semi-transparent black rect dims the dungeon,
        //     then a bold headline + a hint pointing to Stage 8. No
        //     input is consumed in this branch — R still does nothing.
        if (state === 'win') {
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = 'lime';
          ctx.font = 'bold 36px monospace';
          ctx.fillText('YOU WIN', 220, 240);
          ctx.font = '16px monospace';
          ctx.fillStyle = 'white';
          ctx.fillText('Slime defeated. Press R to restart.', 110, 270);
        } else if (state === 'lose') {
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = 'red';
          ctx.font = 'bold 36px monospace';
          ctx.fillText('YOU DIED', 220, 240);
          ctx.font = '16px monospace';
          ctx.fillStyle = 'white';
          ctx.fillText('The dungeon claims another. Press R to restart.', 70, 270);
        }
      }

      // Bounds-check move. Walls = the 4 edge rings (cols 0/19, rows 0/14).
      // In V1 there are no inner walls, so excluding the edges IS the wall check.
      // On a valid move we update position + facing and re-render.
      function movePlayer(dx, dy) {
        // Stage 7: freeze input on win/lose so the overlay is the final frame
        if (state !== 'playing') return;
        var nextCol = player.col + dx;
        var nextRow = player.row + dy;
        if (nextCol < COL_MIN || nextCol > COL_MAX) return; // wall: left/right
        if (nextRow < ROW_MIN || nextRow > ROW_MAX) return; // wall: up/down
        player.col = nextCol;
        player.row = nextRow;
        if (dx > 0)      player.facing = 'right';
        else if (dx < 0) player.facing = 'left';
        else if (dy > 0) player.facing = 'down';
        else if (dy < 0) player.facing = 'up';
        render();
      }

      // Stage 5: facing-string -> unit vector. Safe default (0,0) so a
      // mis-set facing string never produces a wild swing.
      function facingToDir(f) {
        if (f === 'right') return { dx:  1, dy:  0 };
        if (f === 'left')  return { dx: -1, dy:  0 };
        if (f === 'down')  return { dx:  0, dy:  1 };
        if (f === 'up')    return { dx:  0, dy: -1 };
        return { dx: 0, dy: 0 };
      }

      // Stage 5: player swing. 1 tile in facing direction, 1 damage to the
      // slime if it's there, 400ms cooldown, yellow flash on the target
      // tile for the cooldown duration. No contact damage, no win state.
      function playerAttack() {
        // Stage 7: freeze input on win/lose. Placed BEFORE the cooldown
        // check so a held Space after 'win'/'lose' never consumes a swing.
        if (state !== 'playing') return;
        var now = Date.now();
        if (now - lastAttackTime < 400) return; // cooldown guard
        lastAttackTime = now;
        var d  = facingToDir(player.facing);
        var tc = player.col + d.dx;
        var tr = player.row + d.dy;
        // Wall: target tile is outside the interior floor -> no flash, no
        // damage. Keeps a swing into a wall from looking like a hit.
        if (tc < COL_MIN || tc > COL_MAX || tr < ROW_MIN || tr > ROW_MAX) {
          return;
        }
        attackFlash = { col: tc, row: tr, until: now + 400 };
        if (tc === slime.col && tr === slime.row) {
          // Stage 7: clamp slime.hp at 0 (was allowed to go negative in
          // Stage 5) and flip state to 'win' on the killing blow. The
          // state check prevents the same blow from re-triggering 'win'
          // on a follow-up swing (you can't "un-win" a dead slime).
          slime.hp = Math.max(0, slime.hp - 1);
          if (slime.hp === 0 && state === 'playing') state = 'win';
        }
        render();
      }

      // Keyboard input: WASD and Arrows only. No Space, no R.
      window.addEventListener('keydown', function (e) {
        var k = e.key;
        if (k === 'w' || k === 'W' || k === 'ArrowUp') {
          e.preventDefault();
          movePlayer(0, -1);
        } else if (k === 's' || k === 'S' || k === 'ArrowDown') {
          e.preventDefault();
          movePlayer(0, 1);
        } else if (k === 'a' || k === 'A' || k === 'ArrowLeft') {
          e.preventDefault();
          movePlayer(-1, 0);
        } else if (k === 'd' || k === 'D' || k === 'ArrowRight') {
          e.preventDefault();
          movePlayer(1, 0);
        } else if (e.key === ' ') {
          // Stage 5: Space triggers a 1-tile swing in the player's facing
          // direction. Cooldown is enforced inside playerAttack() so a
          // held key still produces at most one attack per 400ms.
          e.preventDefault();
          playerAttack();
        } else if (e.key === 'r' || e.key === 'R') {
          // Stage 8: R restarts the game. Only fires in 'win' or 'lose'
          // state. If the game is still 'playing' this branch is a no-op
          // (no preventDefault, no resetGame) so a stray R during play
          // does nothing. preventDefault stops any default R-key behavior
          // (browser find-in-page) on the win/lose overlays.
          if (state === 'win' || state === 'lose') {
            e.preventDefault();
            resetGame();
          }
        }
        // any other key: do not preventDefault, do not move
      });

      // Stage 4: slime AI — greedy Manhattan chase.
      // Returns true if (c, r) is interior floor. Stage 6 removed the
      // player-tile block: the slime is now allowed to step onto the
      // player's tile, and applyContactDamage() handles the hit.
      function inBoundsAndFree(c, r) {
        if (c < COL_MIN || c > COL_MAX) return false; // wall: left/right edges
        if (r < ROW_MIN || r > ROW_MAX) return false; // wall: top/bottom edges
        return true;
      }

      // Slime tick: pick a cardinal direction that reduces Manhattan distance
      // to the player, 1 tile, walls block. Stage 6: player tile is no longer
      // blocking, and applyContactDamage() runs at the END of the tick so
      // damage is applied at most once per 500ms (the setInterval cadence).
      function slimeTick() {
        // Stage 7: freeze AI on win/lose so the scene stops moving once
        // either side hits 0. The setInterval keeps firing (that's fine),
        // it just no-ops from here.
        if (state !== 'playing') return;
        var dx = player.col - slime.col;
        var dy = player.row - slime.row;
        var candidates = [];
        if (dx > 0 && inBoundsAndFree(slime.col + 1, slime.row)) candidates.push({dc: 1,  dr: 0,  dir: 'right'});
        if (dx < 0 && inBoundsAndFree(slime.col - 1, slime.row)) candidates.push({dc: -1, dr: 0,  dir: 'left' });
        if (dy > 0 && inBoundsAndFree(slime.col, slime.row + 1)) candidates.push({dc: 0,  dr: 1,  dir: 'down' });
        if (dy < 0 && inBoundsAndFree(slime.col, slime.row - 1)) candidates.push({dc: 0,  dr: -1, dir: 'up'   });
        if (candidates.length === 0) return; // blocked — slime waits this tick
        // Tie-break: up(0) > right(1) > down(2) > left(3) per technical-values.md
        var order = { up: 0, right: 1, down: 2, left: 3 };
        candidates.sort(function (a, b) { return order[a.dir] - order[b.dir]; });
        var pick = candidates[0];
        slime.col += pick.dc;
        slime.row += pick.dr;
        applyContactDamage();
        render();
      }

      // Stage 6: contact damage. 1 HP per 500ms tick if the slime is on the
      // player's tile OR adjacent (Manhattan distance <= 1). A dead slime
      // (hp <= 0) is inert and deals no damage. player.hp is allowed to go
      // negative — no death state, no clamp, no game-over screen.
      function applyContactDamage() {
        // Stage 7: freeze contact damage on win/lose. Placed AFTER the
        // existing dead-slime guard so a dead slime still no-ops first
        // (cheaper, and the two checks compose cleanly).
        if (state !== 'playing') return;
        if (slime.hp <= 0) return; // dead slime: no damage
        var dx = player.col - slime.col;
        var dy = player.row - slime.row;
        var dist = Math.abs(dx) + Math.abs(dy); // Manhattan distance
        if (dist <= 1) {
          // Stage 7: clamp player.hp at 0 (was allowed to go negative in
          // Stage 6) and flip state to 'lose' on the killing blow. The
          // state check prevents the same blow from triggering 'lose' a
          // second time if a later hit somehow re-enters this branch.
          player.hp = Math.max(0, player.hp - 1);
          if (player.hp === 0 && state === 'playing') state = 'lose';
          playerFlash = { col: player.col, row: player.row, until: Date.now() + 200 };
        }
      }

      // Stage 8: reset the game to its starting state. Called when the
      // player presses R from a 'win' or 'lose' overlay. Restores HP,
      // positions, facing, cooldowns, and flashes, then re-renders.
      function resetGame() {
        state = 'playing';
        player.hp = 5;
        player.col = 2;
        player.row = 2;
        player.facing = 'right';
        slime.hp = 3;
        slime.col = 17;
        slime.row = 12;
        lastAttackTime = 0;
        attackFlash = { col: -1, row: -1, until: 0 };
        playerFlash = { col: -1, row: -1, until: 0 };
        render();
      }

      // Initial draw
      render();

      // Stage 4: start the slime AI — 500ms tick, 1 tile per tick, no damage.
      setInterval(slimeTick, 500);
    })();
  </script>
</body>
</html>
