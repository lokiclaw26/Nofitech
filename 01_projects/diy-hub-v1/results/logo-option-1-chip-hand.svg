<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 1: Microchip + Spark/Hand -->
  <rect width="512" height="512" fill="#ffffff"/>
  <g transform="translate(256 256)">
    <!-- Chip body -->
    <rect x="-120" y="-120" width="240" height="240" rx="24" fill="#0d9488"/>
    <rect x="-90" y="-90" width="180" height="180" rx="8" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 8" opacity="0.5"/>
    <!-- Chip pins -->
    <g fill="#0d9488">
      <rect x="-150" y="-90" width="30" height="14" rx="2"/>
      <rect x="-150" y="-50" width="30" height="14" rx="2"/>
      <rect x="-150" y="-10" width="30" height="14" rx="2"/>
      <rect x="-150" y="30" width="30" height="14" rx="2"/>
      <rect x="-150" y="70" width="30" height="14" rx="2"/>
      <rect x="120" y="-90" width="30" height="14" rx="2"/>
      <rect x="120" y="-50" width="30" height="14" rx="2"/>
      <rect x="120" y="-10" width="30" height="14" rx="2"/>
      <rect x="120" y="30" width="30" height="14" rx="2"/>
      <rect x="120" y="70" width="30" height="14" rx="2"/>
      <rect x="-90" y="-150" width="14" height="30" rx="2"/>
      <rect x="-50" y="-150" width="14" height="30" rx="2"/>
      <rect x="-10" y="-150" width="14" height="30" rx="2"/>
      <rect x="30" y="-150" width="14" height="30" rx="2"/>
      <rect x="70" y="-150" width="14" height="30" rx="2"/>
      <rect x="-90" y="120" width="14" height="30" rx="2"/>
      <rect x="-50" y="120" width="14" height="30" rx="2"/>
      <rect x="-10" y="120" width="14" height="30" rx="2"/>
      <rect x="30" y="120" width="14" height="30" rx="2"/>
      <rect x="70" y="120" width="14" height="30" rx="2"/>
    </g>
    <!-- Center pin-1 marker -->
    <circle cx="-72" cy="-72" r="8" fill="#ffffff" opacity="0.9"/>
    <!-- Spark / hand in center -->
    <g>
      <path d="M 0 -40 L 18 0 L 4 0 L 18 40 L -4 12 L -18 32 L -8 0 L -22 0 Z" fill="#f97316"/>
    </g>
    <!-- Wordmark -->
    <text x="0" y="190" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#0f172a" letter-spacing="2">DIY HUB</text>
  </g>
</svg>