<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memory Graph — Mission Control</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 180px; background: #111; border-right: 1px solid #2a2a2a; flex-shrink: 0; padding-top: 16px; }
  .sidebar-header { color: #d4af37; font-weight: bold; padding: 8px 16px; font-size: 14px; letter-spacing: 0.5px; }
  .sidebar a { display: block; padding: 10px 16px; color: #b8b8b8; text-decoration: none; font-size: 13px; border-left: 3px solid transparent; transition: all 0.15s; }
  .sidebar a:hover { background: #1a1a1a; color: #e0e0e0; }
  .sidebar a.active { color: #d4af37; border-left-color: #d4af37; background: rgba(212, 175, 55, 0.08); }
  .sidebar-footer { position: absolute; bottom: 12px; left: 16px; right: 16px; font-size: 11px; color: #555; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  header { background: #111; padding: 12px 20px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; color: #e0e0e0; font-weight: 600; }
  header h1 .subtitle { color: #888; font-size: 13px; font-weight: normal; margin-left: 12px; }
  .connection-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; }
  .connection-status .dot { width: 10px; height: 10px; border-radius: 50%; background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
  .connection-status .dot.error { background: #e74c3c; box-shadow: 0 0 6px #e74c3c; }
  .hamburger { display: none; background: transparent; border: 1px solid #2a2a2a; color: #d4af37; padding: 6px 10px; border-radius: 3px; cursor: pointer; font-size: 16px; line-height: 1; }
  .hamburger:hover { background: #1a1a1a; }
  .layout { flex: 1; display: flex; min-height: 0; }
  .controls { width: 300px; background: #111; border-right: 1px solid #2a2a2a; padding: 16px; overflow-y: auto; flex-shrink: 0; }
  .controls h3 { font-size: 12px; text-transform: uppercase; color: #888; margin-bottom: 8px; letter-spacing: 1px; }
  .controls input[type="text"] { width: 100%; padding: 8px 10px; background: #0a0a0a; border: 1px solid #2a2a2a; color: #e0e0e0; border-radius: 3px; font-size: 13px; margin-bottom: 16px; }
  .controls fieldset { border: 1px solid #2a2a2a; border-radius: 4px; padding: 10px; margin-bottom: 16px; }
  .controls fieldset legend { color: #888; font-size: 11px; text-transform: uppercase; padding: 0 6px; }
  .controls label { display: block; font-size: 13px; padding: 3px 0; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .controls label input[type="checkbox"] { accent-color: #d4af37; }
  .controls .kind-color { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
  .controls .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
  .controls input[type="range"] { flex: 1; accent-color: #d4af37; }
  .controls button { width: 100%; padding: 8px; background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.4); border-radius: 3px; cursor: pointer; font-size: 12px; margin-top: 8px; }
  .controls button:hover { background: rgba(231, 76, 60, 0.3); }
  .graph-container { flex: 1; position: relative; background: #0a0a0a; min-width: 0; }
  #graph { position: absolute; inset: 0; }
  .empty-state { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px; font-style: italic; background: rgba(10,10,10,0.85); z-index: 10; pointer-events: none; }
  .right-panel { width: 350px; background: #111; border-left: 1px solid #2a2a2a; display: flex; flex-direction: column; flex-shrink: 0; }
  .right-panel section { padding: 12px 16px; border-bottom: 1px solid #2a2a2a; }
  .right-panel h3 { font-size: 12px; text-transform: uppercase; color: #888; margin-bottom: 8px; letter-spacing: 1px; }
  .event-feed { flex: 1; overflow-y: auto; max-height: 35%; }
  .event-feed ul { list-style: none; padding: 0; }
  .event-feed li { padding: 5px 0; font-size: 11px; color: #b8b8b8; font-family: monospace; border-bottom: 1px solid #1a1a1a; }
  .event-feed li .ev-type { color: #d4af37; }
  .inspector { flex: 1; overflow-y: auto; }
  .inspector h2 { font-size: 16px; color: #d4af37; margin-bottom: 6px; word-break: break-word; }
  .inspector .insp-id { font-family: monospace; font-size: 11px; color: #888; margin-bottom: 10px; word-break: break-all; }
  .inspector .insp-kind { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; margin-bottom: 10px; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
  .inspector .insp-summary { font-size: 13px; color: #b8b8b8; margin-bottom: 12px; line-height: 1.4; word-break: break-word; }
  .inspector .insp-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid #1a1a1a; }
  .inspector .insp-row .label { color: #888; }
  .inspector .insp-row .value { color: #e0e0e0; font-family: monospace; }
  .inspector .insp-tags { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
  .inspector .insp-tag { background: #1a1a1a; border: 1px solid #2a2a2a; padding: 2px 8px; border-radius: 10px; font-size: 10px; color: #b8b8b8; }
  .inspector .insp-section-title { font-size: 11px; text-transform: uppercase; color: #888; margin-top: 12px; margin-bottom: 4px; letter-spacing: 0.5px; }
  .inspector .insp-source { font-family: monospace; font-size: 10px; color: #555; word-break: break-all; }
  footer { background: #111; padding: 8px 20px; border-top: 1px solid #2a2a2a; display: flex; gap: 24px; font-size: 11px; color: #888; flex-wrap: wrap; }
  footer .metric { display: flex; align-items: center; gap: 6px; }
  footer .metric strong { color: #d4af37; }
  footer .metric .total { color: #555; }
  .empty { color: #555; font-style: italic; font-size: 12px; }

  /* Responsive: tablet and below — collapse sidebar to top bar */
  @media (max-width: 900px) {
    body { flex-direction: column; height: 100vh; }
    .sidebar { display: none; }
    .hamburger { display: inline-block; }
    .layout { flex-direction: column; }
    .controls { width: 100%; max-height: 200px; order: 2; border-right: none; border-top: 1px solid #2a2a2a; }
    .graph-container { order: 1; min-height: 400px; }
    .right-panel { width: 100%; max-height: 250px; order: 3; border-left: none; border-top: 1px solid #2a2a2a; }
  }
  /* Responsive: phone — drawers hidden by default, toggled by hamburger */
  @media (max-width: 600px) {
    .controls, .right-panel { display: none; }
    .controls.open, .right-panel.open { display: block; }
    .graph-container { min-height: 320px; }
    header h1 { font-size: 15px; }
    header h1 .subtitle { display: none; }
  }
</style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">⚡ NofiTech</div>
    <a href="/">⚡ Main</a>
    <a href="/kanban">🗂 Kanban</a>
    <a href="/memory-graph" class="active">🧠 Memory Graph</a>
    <div class="sidebar-footer" id="version">v1.17.0+3d</div>
  </div>
  <div class="main">
    <header>
      <h1>Memory Graph <span class="subtitle">Hermes working memory</span></h1>
      <div class="connection-status">
        <span class="dot" id="conn-dot"></span>
        <span id="conn-text">polling 5s</span>
        <button class="hamburger" id="hamburger" aria-label="Toggle panels">☰</button>
      </div>
    </header>
    <div class="layout">
      <aside class="controls">
        <h3>Search</h3>
        <input type="text" id="search" placeholder="Filter by id / label / summary..." />
        <fieldset>
          <legend>Filter by kind</legend>
          <label><input type="checkbox" value="goal" checked /> <span class="kind-color" style="background:#d4af37"></span> Goal</label>
          <label><input type="checkbox" value="task" checked /> <span class="kind-color" style="background:#4a9eff"></span> Task</label>
          <label><input type="checkbox" value="memory" checked /> <span class="kind-color" style="background:#b8b8b8"></span> Memory</label>
          <label><input type="checkbox" value="decision" checked /> <span class="kind-color" style="background:#ff9f43"></span> Decision</label>
          <label><input type="checkbox" value="tool" checked /> <span class="kind-color" style="background:#9b59b6"></span> Tool</label>
          <label><input type="checkbox" value="file" checked /> <span class="kind-color" style="background:#3498db"></span> File</label>
          <label><input type="checkbox" value="error" checked /> <span class="kind-color" style="background:#e74c3c"></span> Error</label>
          <label><input type="checkbox" value="concept" checked /> <span class="kind-color" style="background:#2ecc71"></span> Concept</label>
          <label><input type="checkbox" value="entity" checked /> <span class="kind-color" style="background:#1abc9c"></span> Entity</label>
          <label><input type="checkbox" value="session" checked /> <span class="kind-color" style="background:#95a5a6"></span> Session</label>
          <label><input type="checkbox" value="message" checked /> <span class="kind-color" style="background:#34495e"></span> Message</label>
        </fieldset>
        <div class="slider-row">Min importance: <input type="range" id="importance" min="0" max="1" step="0.05" value="0" /> <span id="importance-val">0.00</span></div>
        <button id="reset">↻ Reset Graph</button>
      </aside>
      <div class="graph-container">
        <div id="graph"></div>
        <div class="empty-state" id="empty-state" style="display:none;">No nodes match current filters.</div>
      </div>
      <aside class="right-panel">
        <section class="event-feed">
          <h3>Recent Events</h3>
          <ul id="events"></ul>
        </section>
        <section class="inspector">
          <h3>Selected Node</h3>
          <div id="node-details"><span class="empty">Click a node to see details</span></div>
        </section>
      </aside>
    </div>
    <footer>
      <div class="metric">Nodes: <strong id="node-count">0</strong> / <span class="total" id="node-total">0</span></div>
      <div class="metric">Edges: <strong id="edge-count">0</strong> / <span class="total" id="edge-total">0</span></div>
      <div class="metric">Last updated: <span id="last-updated">—</span></div>
    </footer>
  </div>

  <script src="vendor/three/three.min.js"></script>
  <script src="vendor/3d-force-graph/3d-force-graph.min.js"></script>
  <script>
    const KIND_COLORS = {
      goal: 0xd4af37, task: 0x4a9eff, memory: 0xb8b8b8, decision: 0xff9f43,
      tool: 0x9b59b6, file: 0x3498db, error: 0xe74c3c, concept: 0x2ecc71,
      entity: 0x1abc9c, session: 0x95a5a6, message: 0x34495e
    };
    const KIND_HEX = {
      goal: '#d4af37', task: '#4a9eff', memory: '#b8b8b8', decision: '#ff9f43',
      tool: '#9b59b6', file: '#3498db', error: '#e74c3c', concept: '#2ecc71',
      entity: '#1abc9c', session: '#95a5a6', message: '#34495e'
    };
    const ACTIVE_EDGE_KINDS = ['created_from','used_tool','edited_file','caused_by','depends_on','blocked_by','resolved_by'];

    let Graph = null;
    let rawNodes = [];
    let rawEdges = [];
    let selectedNode = null;
    let lastError = null;
    let lastRenderedNodeJson = null;
    let currentGraphInitialized = false;
    let resizeDebounce = null;

    function getFilters() {
      const kinds = [...document.querySelectorAll('.controls input[type=checkbox]:checked')].map(c => c.value);
      const minImportance = parseFloat(document.getElementById('importance').value);
      return { kinds, minImportance };
    }

    function applyFilters() {
      if (!Graph) return;
      const filters = getFilters();
      const search = document.getElementById('search').value.toLowerCase();
      const filteredNodes = rawNodes.filter(n => {
        if (!filters.kinds.includes(n.kind)) return false;
        if ((n.importance || 0) < filters.minImportance) return false;
        if (search) {
          const haystack = ((n.label || '') + ' ' + (n.id || '') + ' ' + (n.summary || '')).toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        return true;
      });
      const visibleIds = new Set(filteredNodes.map(n => n.id));
      const filteredEdges = rawEdges.filter(e => visibleIds.has(e.source) && visibleIds.has(e.target));

      // Update footer counts (filtered / total)
      const totalNodes = rawNodes.length;
      const totalEdges = rawEdges.length;
      const nodeCountEl = document.getElementById('node-count');
      const nodeTotalEl = document.getElementById('node-total');
      const edgeCountEl = document.getElementById('edge-count');
      const edgeTotalEl = document.getElementById('edge-total');
      if (nodeCountEl) nodeCountEl.textContent = String(filteredNodes.length);
      if (nodeTotalEl) nodeTotalEl.textContent = String(totalNodes);
      if (edgeCountEl) edgeCountEl.textContent = String(filteredEdges.length);
      if (edgeTotalEl) edgeTotalEl.textContent = String(totalEdges);

      // Empty-state overlay
      const emptyStateEl = document.getElementById('empty-state');
      if (emptyStateEl) {
        emptyStateEl.style.display = filteredNodes.length === 0 ? 'flex' : 'none';
      }

      // Preserve selected node across poll (Fix 2)
      if (selectedNode) {
        const stillThere = filteredNodes.find(n => n.id === selectedNode.id);
        if (!stillThere) {
          selectedNode = null;
          lastRenderedNodeJson = null;
          renderInspector();
        }
      }

      // Fix 1: only call graphData() when the node-id set actually changed.
      const existing = Graph.graphData() || { nodes: [], links: [] };
      const currentIds = new Set((existing.nodes || []).map(n => n.id));
      const newIds = new Set(filteredNodes.map(n => n.id));
      const sameSize = currentIds.size === newIds.size;
      let setsEqual = sameSize;
      if (setsEqual) {
        for (const id of newIds) { if (!currentIds.has(id)) { setsEqual = false; break; } }
      }
      if (setsEqual) {
        // Identity-stable: do nothing on the simulation. Counts are already updated above.
        return;
      }

      // Sets differ — build prevById to forward x/y/z/vx/vy/vz so positions don't snap.
      const prevById = new Map();
      for (const n of (existing.nodes || [])) prevById.set(n.id, n);
      let addedAny = false;
      const enriched = filteredNodes.map(n => {
        const prev = prevById.get(n.id);
        if (prev) {
          // Carry forward physics state from the running simulation.
          return Object.assign({}, n, {
            x: prev.x, y: prev.y, z: prev.z,
            vx: prev.vx, vy: prev.vy, vz: prev.vz
          });
        }
        addedAny = true;
        return n;
      });

      Graph.graphData({ nodes: enriched, links: filteredEdges });
      currentGraphInitialized = true;
      if (addedAny) {
        try { Graph.d3ReheatSimulation(); } catch (e) {}
      }
    }

    function formatDate(s) {
      if (!s) return '—';
      try {
        const d = new Date(s);
        if (isNaN(d.getTime())) return String(s);
        return d.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
      } catch (e) { return String(s); }
    }

    function makeRow(label, value) {
      const row = document.createElement('div');
      row.className = 'insp-row';
      const l = document.createElement('span');
      l.className = 'label';
      l.textContent = label;
      const v = document.createElement('span');
      v.className = 'value';
      v.textContent = (value === null || value === undefined || value === '') ? '—' : String(value);
      row.appendChild(l);
      row.appendChild(v);
      return row;
    }

    function makeSectionTitle(text) {
      const t = document.createElement('div');
      t.className = 'insp-section-title';
      t.textContent = text;
      return t;
    }

    function renderInspector() {
      const el = document.getElementById('node-details');
      // Wipe via DOM (safe: textContent clears children too, but we rebuild fresh)
      while (el.firstChild) el.removeChild(el.firstChild);

      if (!selectedNode) {
        lastRenderedNodeJson = null;
        const span = document.createElement('span');
        span.className = 'empty';
        span.textContent = 'Click a node to see details';
        el.appendChild(span);
        return;
      }

      // Detect change: stringify a clean subset of fields only (skip __threeObj, x/y/z, vx/vy/vz).
      const cleanForDiff = {
        id: selectedNode.id,
        label: selectedNode.label,
        kind: selectedNode.kind,
        summary: selectedNode.summary,
        status: selectedNode.status,
        importance: selectedNode.importance,
        confidence: selectedNode.confidence,
        tags: selectedNode.tags,
        created_at: selectedNode.created_at,
        updated_at: selectedNode.updated_at,
        project: selectedNode.project,
        path: selectedNode.path,
        url: selectedNode.url,
        source: selectedNode.source
      };
      const diffKey = JSON.stringify(cleanForDiff);
      if (diffKey === lastRenderedNodeJson) {
        // No change — leave inspector as-is (don't churn DOM).
        return;
      }
      lastRenderedNodeJson = diffKey;
      while (el.firstChild) el.removeChild(el.firstChild);

      // Label (h2, gold)
      const h2 = document.createElement('h2');
      h2.textContent = selectedNode.label || selectedNode.id || '(unnamed)';
      el.appendChild(h2);

      // id (mono gray)
      const idEl = document.createElement('div');
      idEl.className = 'insp-id';
      idEl.textContent = 'id: ' + (selectedNode.id || '—');
      el.appendChild(idEl);

      // Kind badge
      const kind = selectedNode.kind || 'unknown';
      const badge = document.createElement('span');
      badge.className = 'insp-kind';
      badge.style.background = KIND_HEX[kind] || '#555';
      badge.textContent = kind;
      el.appendChild(badge);

      // Summary
      if (selectedNode.summary) {
        const sum = document.createElement('div');
        sum.className = 'insp-summary';
        sum.textContent = selectedNode.summary;
        el.appendChild(sum);
      }

      // Metadata rows
      el.appendChild(makeRow('status', selectedNode.status));
      el.appendChild(makeRow('importance', selectedNode.importance !== undefined ? Number(selectedNode.importance).toFixed(2) : null));
      el.appendChild(makeRow('confidence', selectedNode.confidence !== undefined ? Number(selectedNode.confidence).toFixed(2) : null));

      // Tags (chips)
      if (Array.isArray(selectedNode.tags) && selectedNode.tags.length) {
        el.appendChild(makeSectionTitle('tags'));
        const tagsWrap = document.createElement('div');
        tagsWrap.className = 'insp-tags';
        for (const tag of selectedNode.tags) {
          const chip = document.createElement('span');
          chip.className = 'insp-tag';
          chip.textContent = String(tag);
          tagsWrap.appendChild(chip);
        }
        el.appendChild(tagsWrap);
      }

      // Dates
      el.appendChild(makeSectionTitle('timestamps'));
      el.appendChild(makeRow('created', formatDate(selectedNode.created_at)));
      el.appendChild(makeRow('updated', formatDate(selectedNode.updated_at)));

      // Project / path / url
      const hasLoc = selectedNode.project || selectedNode.path || selectedNode.url;
      if (hasLoc) {
        el.appendChild(makeSectionTitle('location'));
        if (selectedNode.project) el.appendChild(makeRow('project', selectedNode.project));
        if (selectedNode.path) el.appendChild(makeRow('path', selectedNode.path));
        if (selectedNode.url) el.appendChild(makeRow('url', selectedNode.url));
      }

      // Source
      if (selectedNode.source) {
        el.appendChild(makeSectionTitle('source'));
        const src = document.createElement('div');
        src.className = 'insp-source';
        src.textContent = String(selectedNode.source);
        el.appendChild(src);
      }
    }

    async function fetchGraph() {
      try {
        const resp = await fetch('/api/memory-graph');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        rawNodes = data.nodes || [];
        rawEdges = data.edges || [];
        const lu = data.last_updated || '—';
        const luEl = document.getElementById('last-updated');
        if (luEl) luEl.textContent = lu;
        document.getElementById('conn-dot').classList.remove('error');
        document.getElementById('conn-text').textContent = 'polling 5s';
        applyFilters();
      } catch (err) {
        lastError = err.message;
        document.getElementById('conn-dot').classList.add('error');
        document.getElementById('conn-text').textContent = 'error: ' + err.message;
      }
    }

    async function fetchEvents() {
      try {
        const resp = await fetch('/api/memory-graph/events/recent?n=20');
        if (!resp.ok) return;
        const data = await resp.json();
        const ul = document.getElementById('events');
        while (ul.firstChild) ul.removeChild(ul.firstChild);
        const events = (data.events || []).slice(-20).reverse();
        for (const ev of events) {
          const li = document.createElement('li');
          const typeSpan = document.createElement('span');
          typeSpan.className = 'ev-type';
          typeSpan.textContent = (ev.type || '?');
          li.appendChild(typeSpan);
          li.appendChild(document.createTextNode(' ' + (ev.node?.id || ev.edge?.source || '')));
          ul.appendChild(li);
        }
      } catch (err) {}
    }

    function setGraphSize() {
      if (!Graph) return;
      const el = document.querySelector('.graph-container');
      if (!el) return;
      const w = Math.floor(el.clientWidth);
      const h = Math.floor(el.clientHeight);
      if (w > 0 && h > 0) {
        try { Graph.width(w).height(h); } catch (e) {}
      }
    }

    function initGraph() {
      if (typeof ForceGraph3D !== 'function') {
        document.getElementById('graph').innerHTML = '<div class="empty" style="padding:20px">3d-force-graph not loaded. Check vendor/ directory.</div>';
        return;
      }
      Graph = ForceGraph3D()(document.getElementById('graph'))
        .backgroundColor('#0a0a0a')
        .nodeId('id')
        .nodeLabel(n => n.label || n.id || '?')
        .nodeColor(n => KIND_COLORS[n.kind] || 0x888888)
        .nodeVal(n => 1 + (n.importance || 0) * 8)
        .nodeRelSize(4)
        .linkSource('source')
        .linkTarget('target')
        .linkColor(() => 'rgba(212, 175, 55, 0.4)')
        .linkWidth(l => (l.weight || 0.5) * 2)
        .linkDirectionalParticles(l => ACTIVE_EDGE_KINDS.includes(l.kind) ? 4 : 0)
        .linkDirectionalParticleSpeed(0.006)
        .linkDirectionalParticleColor(() => '#d4af37')
        .linkDirectionalParticleResolution(8)
        .onNodeClick(n => {
          selectedNode = n;
          renderInspector();
        });

      // Initial size + camera
      setGraphSize();
      try { Graph.cameraPosition({ x: 0, y: 0, z: 250 }); } catch (e) {}

      // ResizeObserver on the container (Fix 3) — debounced.
      const container = document.querySelector('.graph-container');
      if (container && typeof ResizeObserver !== 'undefined') {
        const ro = new ResizeObserver(entries => {
          if (!Graph) return;
          if (resizeDebounce) clearTimeout(resizeDebounce);
          resizeDebounce = setTimeout(() => {
            const { width, height } = entries[0].contentRect;
            if (width > 0 && height > 0) {
              try { Graph.width(Math.floor(width)).height(Math.floor(height)); } catch (e) {}
            }
          }, 200);
        });
        ro.observe(container);
      } else {
        window.addEventListener('resize', () => {
          if (resizeDebounce) clearTimeout(resizeDebounce);
          resizeDebounce = setTimeout(setGraphSize, 200);
        });
      }
    }

    // Hamburger toggle (mobile)
    document.getElementById('hamburger').addEventListener('click', () => {
      const c = document.querySelector('.controls');
      const r = document.querySelector('.right-panel');
      if (c) c.classList.toggle('open');
      if (r) r.classList.toggle('open');
    });

    // Wire up filters
    document.getElementById('search').addEventListener('input', applyFilters);
    document.querySelectorAll('.controls input[type=checkbox]').forEach(cb => cb.addEventListener('change', applyFilters));
    document.getElementById('importance').addEventListener('input', (e) => {
      document.getElementById('importance-val').textContent = parseFloat(e.target.value).toFixed(2);
      applyFilters();
    });
    document.getElementById('reset').addEventListener('click', async () => {
      if (!confirm('Reset graph to clean sample data?')) return;
      try {
        await fetch('/api/memory-graph/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ confirm: true }) });
        await fetchGraph();
        await fetchEvents();
      } catch (err) { alert('Reset failed: ' + err.message); }
    });

    // Polling
    setInterval(fetchGraph, 5000);
    setInterval(fetchEvents, 5000);

    // Init
    initGraph();
    fetchGraph().then(() => fetchEvents());
  </script>
</body>
</html>
